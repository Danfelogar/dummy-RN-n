name: React Native CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '22.19.0'
  PNPM_VERSION: '9.9.0'

# JOB 1 — Lint + Test (runs on every push/PR)
jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # Secure install: postinstall scripts are blocked (see security architecture)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Reconstruct .env from GitHub Secrets so modules that read env vars at import time work
      - name: Create .env file
        run: |
          echo "PORT_FOR_BACKEND=${{ secrets.PORT_FOR_BACKEND }}" > .env
          echo "FAILURE_RATE_BACKEND=${{ secrets.FAILURE_RATE_BACKEND }}" >> .env
          echo "MMKV_ENCRYPTION_KEY=${{ secrets.MMKV_ENCRYPTION_KEY }}" >> .env
          echo "URL_BASE_FOR_FRONTEND=${{ secrets.URL_BASE_FOR_FRONTEND }}" >> .env
          echo "URL_BASE_FOR_FRONTEND_ANDROID=${{ secrets.URL_BASE_FOR_FRONTEND_ANDROID }}" >> .env
          echo "FEE_RATE_FRONTEND=${{ secrets.FEE_RATE_FRONTEND }}" >> .env
          echo "MIN_FEE_FRONTEND=${{ secrets.MIN_FEE_FRONTEND }}" >> .env

      - name: Run ESLint
        run: pnpm lint

      - name: Run unit tests with coverage
        run: pnpm run test

      # Upload coverage so it is visible in the Actions run summary
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # JOB 2 — Android build (only on master push)
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create .env file
        run: |
          echo "PORT_FOR_BACKEND=3002" > .env
          echo "FAILURE_RATE_BACKEND=0.2" >> .env
          echo "MMKV_ENCRYPTION_KEY=${{ secrets.MMKV_ENCRYPTION_KEY }}" >> .env
          echo "URL_BASE_FOR_FRONTEND=http://localhost:3002" >> .env
          echo "URL_BASE_FOR_FRONTEND_ANDROID=http://10.0.2.2:3002" >> .env
          echo "FEE_RATE_FRONTEND=0.035" >> .env
          echo "MIN_FEE_FRONTEND=0.35" >> .env

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew clean assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

  # JOB 3 — iOS build (only on master push)
  build-ios:
    name: Build iOS App Bundle
    runs-on: macos-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create .env file
        run: |
          echo "PORT_FOR_BACKEND=3002" > .env
          echo "FAILURE_RATE_BACKEND=0.2" >> .env
          echo "MMKV_ENCRYPTION_KEY=${{ secrets.MMKV_ENCRYPTION_KEY }}" >> .env
          echo "URL_BASE_FOR_FRONTEND=http://localhost:3002" >> .env
          echo "URL_BASE_FOR_FRONTEND_ANDROID=http://10.0.2.2:3002" >> .env
          echo "FEE_RATE_FRONTEND=0.035" >> .env
          echo "MIN_FEE_FRONTEND=0.35" >> .env

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios && pod install --repo-update

      - name: Build iOS for simulator (no signing required)
        run: |
          xcodebuild \
            -workspace ios/ShellTechnicalTestRN.xcworkspace \
            -scheme ShellTechnicalTestRN \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            clean build

      - name: Package .app bundle as zip
        run: |
          mkdir -p build
          cd ios/build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../../build/ShellTechnicalTestRN.app.zip ShellTechnicalTestRN.app

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ShellTechnicalTestRN.app.zip
          retention-days: 7

  # JOB 4 — Summary (after both builds succeed)
  deploy-artifacts:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk

      - name: Download iOS App Bundle
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-app

      - name: Print artifact summary
        run: |
          echo "## 🚀 Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -h app-release.apk 2>/dev/null | cut -f1 || echo "N/A")
          ZIP_SIZE=$(du -h ShellTechnicalTestRN.app.zip 2>/dev/null | cut -f1 || echo "N/A")
          echo "| 🤖 Android | app-release.apk | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 iOS | ShellTechnicalTestRN.app.zip | $ZIP_SIZE |" >> $GITHUB_STEP_SUMMARY
